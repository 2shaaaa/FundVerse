apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundverse-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fundverse-frontend
  template:
    metadata:
      labels:
        app: fundverse-frontend
    spec:
      containers:
      - name: frontend
        image: DOCKER_USER/fundverse:latest
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fundverse-service
spec:
  type: NodePort
  selector:
    app: fundverse-frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080